---
name: ci

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@9.0.0
    permissions:
      actions: write
      checks: write
      pull-requests: write
      statuses: write
      issues: write

  integration:
    needs: lint-unit
    runs-on: windows-latest
    strategy:
      matrix:
        os:
          - windows-latest
        suite:
          - default
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v7
      - name: Install Cinc Workstation
        uses: sous-chefs/.github/.github/actions/install-workstation@9.0.0
      - name: Test Kitchen
        shell: pwsh
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.exec.yml
        run: chef exec kitchen test ${{ matrix.suite }}-${{ matrix.os }} --destroy=always

---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: latest
  channel: stable
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  chef_license: accept

verifier:
  name: inspec

platforms:
  - name: windows-2019
    driver:
      box: tas50/windows_2019
  - name: windows-2022
    driver:
      box: tas50/windows_2022

x-run_lists:
  default: &default_run_list
    - recipe[test::default]

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default

suites:
  - name: default
    run_list: *default_run_list
    verifier: *default_verifier

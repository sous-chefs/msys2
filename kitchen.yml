---
driver:
  name: exec

transport:
  name: exec

provisioner:
  name: chef_infra
  product_name: cinc
  install_strategy: skip
  chef_client_path: chef-client
  policyfile_path: Policyfile.rb
  enforce_idempotency: true
  multiple_converge: 2
  deprecations_as_errors: true
  chef_license: accept-no-persist

verifier:
  name: inspec

platforms:
  - name: windows-latest
suites:
  - name: default
    run_list:
      - recipe[msys2::default]
    verifier:
      inspec_tests:
        - test/integration/default
    attributes:
      msys2:
        auto_update: false
        install_dir: "C:/msys64"
        packages: ["git"]
        override_package: true
        override_execute: true
